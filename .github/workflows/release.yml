name: Release Binaries
on:
  release:
    types: [published]

permissions:
  contents: write

env:
  NIM_VERSION: 2.2.10

jobs:
  build:
    name: Build for ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: linux-x86_64
            artifact: anvi-export-linux-x86_64
            nim_platform: linux_x64
          - os: ubuntu-22.04-arm
            target: linux-aarch64
            artifact: anvi-export-linux-aarch64
            nim_platform: linux_arm64
          - os: macos-15
            target: macos-aarch64
            artifact: anvi-export-macos-aarch64
            nim_platform: macosx_arm64
          - os: macos-15-intel
            target: macos-x86_64
            artifact: anvi-export-macos-x86_64
            nim_platform: macosx_x64
    steps:
      - uses: actions/checkout@v4

      - name: Set up Nim
        shell: bash
        run: |
          archive="nim-${NIM_VERSION}-${{ matrix.nim_platform }}.tar.xz"
          curl --fail --location --show-error --silent \
            "https://nim-lang.org/download/${archive}" \
            --output "${RUNNER_TEMP}/${archive}"
          tar -xf "${RUNNER_TEMP}/${archive}" -C "${RUNNER_TEMP}"
          nim_dir="$(find "${RUNNER_TEMP}" -maxdepth 1 -type d -name "nim-${NIM_VERSION}*" -print -quit)"
          if [[ -z "${nim_dir}" ]]; then
            echo "Could not find extracted Nim ${NIM_VERSION} directory" >&2
            exit 1
          fi
          echo "${nim_dir}/bin" >> "${GITHUB_PATH}"
          "${nim_dir}/bin/nim" --version
          "${nim_dir}/bin/nimble" --version

      - name: Cache nimble packages
        uses: actions/cache@v4
        with:
          path: ~/.nimble
          key: ${{ matrix.target }}-nimble-${{ hashFiles('*.nimble') }}
          restore-keys: ${{ matrix.target }}-nimble-

      - name: Install zlib (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update

      - name: Install dependencies
        run: nimble install -d -y

      - name: Build release binary
        run: nimble build -d:release

      - name: Prepare artifact
        run: cp anvi-to-fasta ${{ matrix.artifact }}"

      - name: Upload to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.event.release.tag_name }}" "${{ matrix.artifact }}" --clobber
