name: Release Binaries
on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: Build for ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: linux-x86_64
            artifact: anvi-to-fasta-linux-x86_64
          - os: ubuntu-22.04-arm
            target: linux-aarch64
            artifact: anvi-to-fasta-linux-aarch64
          - os: macos-15
            target: macos-aarch64
            artifact: anvi-to-fasta-macos-aarch64
          - os: macos-13
            target: macos-x86_64
            artifact: anvi-to-fasta-macos-x86_64
    steps:
      - uses: actions/checkout@v4

      - name: Set up Nim
        uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: '2.2.4'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache nimble packages
        uses: actions/cache@v4
        with:
          path: ~/.nimble
          key: ${{ matrix.target }}-nimble-${{ hashFiles('*.nimble') }}
          restore-keys: ${{ matrix.target }}-nimble-

      - name: Install dependencies
        run: nimble install -d -y

      - name: Build release binary
        run: nimble build -d:release

      - name: Prepare artifact
        run: cp anvi-to-fasta ${{ matrix.artifact }}

      - name: Upload to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.event.release.tag_name }}" "${{ matrix.artifact }}" --clobber
